<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Generator - 提示词神器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-3xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-3">🤖 AI Prompt Generator</h1>
      <p class="text-zinc-400">输入你的想法，一键生成高质量提示词</p>
    </div>

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-700 mb-8">
      <label class="block text-sm mb-3">输入主题或任务：</label>
      <textarea id="input" rows="3" 
                class="w-full bg-black border border-zinc-700 rounded-2xl p-5 text-white placeholder-zinc-500 focus:outline-none focus:border-blue-500"
                placeholder="例如：写一篇关于 GitHub 的文章..."></textarea>
      
      <button onclick="generatePrompt()" 
              class="mt-6 w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 font-bold text-lg rounded-2xl transition">
        ✨ 生成提示词
      </button>
    </div>

    <div id="result" class="hidden bg-zinc-900 p-8 rounded-3xl border border-zinc-700">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-semibold">生成的提示词</h3>
        <button onclick="copyPrompt()" 
                class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl flex items-center gap-2">
          <i class="fas fa-copy"></i> 复制
        </button>
      </div>
      <pre id="promptText" class="bg-black p-6 rounded-2xl text-sm whitespace-pre-wrap overflow-auto max-h-96 text-emerald-300"></pre>
    </div>

    <div class="mt-10 text-center text-zinc-500 text-sm">
      今天提交记录：AI 提示词生成器 | 纯前端实现
    </div>
  </div>

  <script>
    function generatePrompt() {
      const input = document.getElementById('input').value.trim();
      if (!input) {
        alert("请输入主题或任务！");
        return;
      }

      const templates = [
        `你是一位专业的${input}专家。请用清晰、结构化的方式帮我完成以下任务：`,
        `请以专家水平，详细解释如何${input}。请分步骤说明，并给出实用示例。`,
        `帮我生成高质量的内容关于"${input}"。要求：语言生动、专业、包含实际案例。`
      ];

      const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
      const prompt = `${randomTemplate}\n\n主题：${input}\n\n请一步一步思考，并给出完整回答。`;

      document.getElementById('promptText').textContent = prompt;
      document.getElementById('result').classList.remove('hidden');
    }

    function copyPrompt() {
      const text = document.getElementById('promptText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert("✅ 已复制到剪贴板！");
      });
    }
  </script>
</body>
</html>
